<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>춘몽 쇼룸 이벤트</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Pretendard', sans-serif;
}

body{
    background:#f8f7f5;
    color:#222;
    line-height:1.5;
}

.container{
    max-width:500px;
    margin:auto;
    padding:24px;
}

.logo{
    text-align:center;
    margin-bottom:30px;
}

.logo h1{
    font-size:32px;
    font-weight:300;
    letter-spacing:8px;
}

.logo p{
    margin-top:8px;
    color:#777;
}

.card{
    background:white;
    border-radius:16px;
    padding:24px;
    box-shadow:0 5px 20px rgba(0,0,0,.05);
}

.section{
    margin-bottom:24px;
}

.section h2{
    font-size:18px;
    margin-bottom:12px;
}

label{
    display:block;
    margin-bottom:8px;
    font-size:14px;
}

input, select{
    width:100%;
    padding:12px;
    border:1px solid #ddd;
    border-radius:8px;
    margin-bottom:12px;
}

.radio-group{
    display:flex;
    flex-direction:column;
    gap:10px;
}

.radio-group label{
    display:flex;
    align-items:center;
    gap:8px;
}

.radio-group input{
    width:auto;
    margin:0;
}

.checkbox-group{
    margin-top:10px;
}

.checkbox-group label{
    display:flex;
    align-items:flex-start;
    gap:8px;
    margin-bottom:12px;
}

.checkbox-group input{
    width:auto;
    margin-top:4px;
}

button{
    width:100%;
    padding:16px;
    border:none;
    background:#222;
    color:white;
    font-size:16px;
    border-radius:10px;
    cursor:pointer;
}

button:hover{
    opacity:.9;
}

.notice{
    font-size:12px;
    color:#888;
    margin-top:20px;
}
</style>
</head>

<body>

<div class="container">

    <div class="logo">
        <h1>春夢</h1>
        <p>춘몽 쇼룸 방문 이벤트</p>
    </div>

    <div class="card">

        <div class="section">
            <h2>🎁 이벤트 참여</h2>
            <p>
                개인정보 입력 후 향 취향 테스트를 완료하면
                춘몽 샘플을 증정해드립니다.
            </p>
        </div>

        <div class="section">
            <h2>기본 정보</h2>

            <input type="text" placeholder="이름">

            <input type="tel" placeholder="휴대폰 번호">

            <input type="email" placeholder="이메일">

            <select>
                <option>연령대 선택</option>
                <option>20대</option>
                <option>30대</option>
                <option>40대</option>
                <option>50대 이상</option>
            </select>
        </div>

        <div class="section">
            <h2>관심 제품</h2>

            <div class="radio-group">
                <label><input type="radio" name="product"> 향수</label>
                <label><input type="radio" name="product"> 섬유향수</label>
                <label><input type="radio" name="product"> 디퓨저</label>
                <label><input type="radio" name="product"> 차량용 방향제</label>
            </div>
        </div>

        <div class="section">
            <h2>선호하는 향</h2>

            <div class="radio-group">
                <label><input type="radio" name="scent"> 우디</label>
                <label><input type="radio" name="scent"> 플로럴</label>
                <label><input type="radio" name="scent"> 머스크</label>
                <label><input type="radio" name="scent"> 시트러스</label>
            </div>
        </div>

        <div class="section">
            <h2>개인정보 동의</h2>

            <div class="checkbox-group">

                <label>
                    <input type="checkbox">
                    개인정보 수집 및 이용에 동의합니다.
                </label>

                <label>
                    <input type="checkbox">
                    광고성 정보 수신(MMS, 이메일)에 동의합니다.
                </label>

                <label>
                    <input type="checkbox">
                    맞춤형 광고 및 리타겟팅 활용에 동의합니다.
                </label>

            </div>
        </div>

        <button>
            이벤트 참여하기
        </button>

        <div class="notice">
            입력해주신 정보는 이벤트 운영 및 마케팅 활용 목적으로 사용되며,
            관련 법령에 따라 안전하게 보관됩니다.
        </div>

    </div>

</div>

</body>
</html>
